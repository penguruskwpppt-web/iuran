<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halaman Tidak Ditemukan - KWP3T</title>
  <!-- Font Awesome untuk ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts (sama seperti index) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0b2e4f;
      --accent: #f59e0b;
      --light: #f8fafc;
      --dark: #1e293b;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, #1e4f7a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
    }
    .error-container {
      background: white;
      border-radius: 32px;
      padding: 48px 32px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
      animation: fadeInUp 0.5s ease-out;
    }
    .logo {
      margin-bottom: 24px;
    }
    .logo img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      /* border: 3px solid var(--accent); */ /* border dihilangkan */
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .icon {
      font-size: 5rem;
      color: var(--accent);
      margin-bottom: 20px;
      animation: bounce 1s ease infinite;
    }
    h1 {
      font-size: 5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 16px;
      letter-spacing: 4px;
    }
    p {
      font-size: 1.1rem;
      color: #4b5563;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: #000;
      padding: 12px 28px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background: #e67e22;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(245,158,11,0.3);
    }
    .btn i {
      font-size: 1.2rem;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }
    @media (max-width: 480px) {
      .error-container {
        padding: 32px 20px;
      }
      h1 {
        font-size: 3.5rem;
      }
      .icon {
        font-size: 3.5rem;
      }
      .logo img {
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="logo">
      <img src="images/logo.webp" alt="Logo KWP3T" onerror="this.src='https://placehold.co/100x100/f59e0b/fff?text=KWP3T'">
    </div>
    <div class="icon">
      <i class="fas fa-map-marked-alt"></i>
    </div>
    <h1>404</h1>
    <p>Maaf, halaman yang Anda cari tidak ditemukan. Mungkin URL salah atau halaman telah dipindahkan.</p>
    <a href="index.html" class="btn">
      <i class="fas fa-home"></i> Kembali ke Beranda
    </a>
  </div>
</body>
</html>
