<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Data Warga - KWP3T Admin</title>
  <link rel="icon" href="../images/logo.webp" type="image/webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* CSS sama seperti sebelumnya */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f4f4;
    }
    .navbar {
      background: #0b2e4f;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .nav-brand img { width: 40px; border-radius: 50%; }
    .nav-links {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: #1e4f7a;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }
    h1 {
      margin-bottom: 20px;
      color: #0b2e4f;
    }
    .btn-primary {
      background: #0b2e4f;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 20px;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #1e4f7a;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 12px;
      text-align: left;
    }
    th {
      background: #0b2e4f;
      color: white;
    }
    .btn-edit, .btn-delete {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 5px;
    }
    .btn-edit {
      background: #f59e0b;
      color: white;
    }
    .btn-delete {
      background: #e74c3c;
      color: white;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      max-width: 500px;
      width: 90%;
      padding: 20px;
      border-radius: 16px;
    }
    .modal-content h2 {
      margin-bottom: 20px;
    }
    .modal-content input, .modal-content select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    @media (max-width: 768px) {
      .navbar { flex-direction: column; align-items: stretch; }
      .nav-links { justify-content: center; }
      table { font-size: 0.85rem; }
      th, td { padding: 8px; }
      .btn-edit, .btn-delete { padding: 4px 8px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="../images/logo.webp" alt="Logo">
      <span>Admin KWP3T</span>
    </div>
    <div class="nav-links">
      <a href="admin.html">Dashboard</a>
      <a href="warga.html" class="active">Data Warga</a>
      <a href="iuran.html">Bayar Iuran</a>
      <a href="laporan.html">Laporan Kas</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Data Warga</h1>
    <button id="btnTambahWarga" class="btn-primary"><i class="fas fa-plus"></i> Tambah Warga</button>
    <div style="overflow-x: auto;">
      <table id="wargaTable">
        <thead>
          <tr><th>No Rumah</th><th>Nama Pemilik</th><th>No HP</th><th>Status</th><th>Kondisi</th><th>Iuran/Bulan</th><th>Koordinator</th><th>Aksi</th>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="modalWarga" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Tambah Warga</h2>
      <form id="wargaForm">
        <input type="hidden" id="no_rumah_old">
        <input type="text" id="no_rumah" placeholder="No Rumah" required>
        <input type="text" id="nama_pemilik" placeholder="Nama Pemilik" required>
        <input type="text" id="no_hp_pemilik" placeholder="No HP">
        <select id="status_kepemilikan">
          <option value="Milik Sendiri">Milik Sendiri</option>
          <option value="Kontrak">Kontrak</option>
        </select>
        <select id="kondisi_terakhir">
          <option value="Berpenghuni">Berpenghuni</option>
          <option value="Kosong">Kosong</option>
          <option value="Dibebaskan">Dibebaskan</option>
        </select>
        <input type="number" id="iuran_per_bulan" placeholder="Iuran per bulan" value="75000">
        <input type="text" id="koordinator" placeholder="Koordinator">
        <div class="modal-buttons">
          <button type="submit" class="btn-primary">Simpan</button>
          <button type="button" id="closeModal" style="background:#ccc;">Batal</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://wuargtxulaquxpziuzho.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1YXJndHh1bGFxdXhweml1emhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjMxNTYsImV4cCI6MjA5MDA5OTE1Nn0.EcVFAGh3ZgTDs8Paz9O_8MpkliKPF0vI7cAuuIsvb2U';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let currentEdit = null;

      // Cek login dan role
      (async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
          window.location.href = 'login.html';
          return;
        }
        const { data: profile, error } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', user.id)
          .single();
        if (error || !profile) {
          alert('Profil tidak ditemukan. Hubungi administrator.');
          window.location.href = '../index.html';
          return;
        }
        const allowedRoles = ['admin', 'bendahara', 'sekretaris'];
        if (!allowedRoles.includes(profile.role)) {
          alert('Akses ditolak. Hanya pengurus yang dapat mengakses halaman ini.');
          window.location.href = '../index.html';
          return;
        }
        // Jika role valid, lanjutkan load data
        loadWarga();
      })();

      function formatRupiah(angka) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka || 0);
      }

      async function loadWarga() {
        const { data, error } = await supabase.from('warga').select('*').order('no_rumah');
        if (error) console.error(error);
        else renderTable(data);
      }

      function renderTable(wargaList) {
        const tbody = document.querySelector('#wargaTable tbody');
        tbody.innerHTML = '';
        wargaList.forEach(w => {
          const row = tbody.insertRow();
          row.insertCell(0).innerText = w.no_rumah;
          row.insertCell(1).innerText = w.nama_pemilik;
          row.insertCell(2).innerText = w.no_hp_pemilik || '-';
          row.insertCell(3).innerText = w.status_kepemilikan;
          row.insertCell(4).innerText = w.kondisi_terakhir;
          row.insertCell(5).innerText = formatRupiah(w.iuran_per_bulan);
          row.insertCell(6).innerText = w.koordinator || '-';
          const actionCell = row.insertCell(7);
          const editBtn = document.createElement('button');
          editBtn.innerText = 'Edit';
          editBtn.className = 'btn-edit';
          editBtn.onclick = () => openModal(w);
          const deleteBtn = document.createElement('button');
          deleteBtn.innerText = 'Hapus';
          deleteBtn.className = 'btn-delete';
          deleteBtn.onclick = () => deleteWarga(w.no_rumah);
          actionCell.appendChild(editBtn);
          actionCell.appendChild(deleteBtn);
        });
      }

      function openModal(warga = null) {
        const modal = document.getElementById('modalWarga');
        document.getElementById('modalTitle').innerText = warga ? 'Edit Warga' : 'Tambah Warga';
        if (warga) {
          document.getElementById('no_rumah_old').value = warga.no_rumah;
          document.getElementById('no_rumah').value = warga.no_rumah;
          document.getElementById('no_rumah').disabled = true;
          document.getElementById('nama_pemilik').value = warga.nama_pemilik;
          document.getElementById('no_hp_pemilik').value = warga.no_hp_pemilik || '';
          document.getElementById('status_kepemilikan').value = warga.status_kepemilikan;
          document.getElementById('kondisi_terakhir').value = warga.kondisi_terakhir;
          document.getElementById('iuran_per_bulan').value = warga.iuran_per_bulan;
          document.getElementById('koordinator').value = warga.koordinator || '';
          currentEdit = warga.no_rumah;
        } else {
          document.getElementById('no_rumah_old').value = '';
          document.getElementById('no_rumah').disabled = false;
          document.getElementById('no_rumah').value = '';
          document.getElementById('nama_pemilik').value = '';
          document.getElementById('no_hp_pemilik').value = '';
          document.getElementById('status_kepemilikan').value = 'Milik Sendiri';
          document.getElementById('kondisi_terakhir').value = 'Berpenghuni';
          document.getElementById('iuran_per_bulan').value = '75000';
          document.getElementById('koordinator').value = '';
          currentEdit = null;
        }
        modal.style.display = 'flex';
      }

      document.getElementById('closeModal').onclick = () => {
        document.getElementById('modalWarga').style.display = 'none';
      };

      document.getElementById('wargaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
          no_rumah: document.getElementById('no_rumah').value,
          nama_pemilik: document.getElementById('nama_pemilik').value,
          no_hp_pemilik: document.getElementById('no_hp_pemilik').value || null,
          status_kepemilikan: document.getElementById('status_kepemilikan').value,
          kondisi_terakhir: document.getElementById('kondisi_terakhir').value,
          iuran_per_bulan: parseInt(document.getElementById('iuran_per_bulan').value),
          koordinator: document.getElementById('koordinator').value || null,
          updated_at: new Date()
        };
        let error;
        if (currentEdit) {
          const { error: updateError } = await supabase.from('warga').update(data).eq('no_rumah', currentEdit);
          error = updateError;
        } else {
          data.created_at = new Date();
          const { error: insertError } = await supabase.from('warga').insert([data]);
          error = insertError;
        }
        if (error) alert('Gagal menyimpan: ' + error.message);
        else {
          document.getElementById('modalWarga').style.display = 'none';
          loadWarga();
        }
      });

      async function deleteWarga(no_rumah) {
        if (confirm(`Yakin hapus rumah ${no_rumah}?`)) {
          const { error } = await supabase.from('warga').delete().eq('no_rumah', no_rumah);
          if (error) alert('Gagal hapus: ' + error.message);
          else loadWarga();
        }
      }

      document.getElementById('btnTambahWarga').onclick = () => openModal();

      document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await supabase.auth.signOut();
        window.location.href = 'login.html';
      });
    })();
  </script>
</body>
</html>
