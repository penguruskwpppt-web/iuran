<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Laporan Kas - KWP3T Admin</title>
  <link rel="icon" href="../images/logo.webp" type="image/webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f4f4;
    }
    .navbar {
      background: #0b2e4f;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .nav-brand img { width: 40px; border-radius: 50%; }
    .nav-links {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: #1e4f7a;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }
    h1 {
      margin-bottom: 20px;
      color: #0b2e4f;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 24px;
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-weight: 600;
      font-size: 0.85rem;
    }
    input, button {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: inherit;
    }
    button {
      background: #0b2e4f;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #1e4f7a;
    }
    .btn-print {
      background: #2c3e50;
      margin-left: auto;
    }
    .btn-export {
      background: #27ae60;
    }
    .btn-quick {
      background: #f59e0b;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .summary-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border-left: 5px solid #f59e0b;
    }
    .summary-card h3 {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 8px;
    }
    .summary-card .amount {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0b2e4f;
    }
    .chart-container {
      background: white;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
    }
    canvas {
      max-height: 300px;
      width: 100%;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      font-size: 0.85rem;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 12px;
      text-align: left;
    }
    th {
      background: #0b2e4f;
      color: white;
    }
    .loading {
      text-align: center;
      padding: 20px;
      font-style: italic;
      color: #64748b;
    }
    @media (max-width: 768px) {
      .navbar { flex-direction: column; align-items: stretch; }
      .nav-links { justify-content: center; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .btn-print { margin-left: 0; }
      table { font-size: 0.75rem; }
      th, td { padding: 8px; }
    }
    @media print {
      body { background: white; }
      .navbar, .filter-bar, .btn-print, .btn-export, .btn-quick, .chart-container { display: none; }
      .summary-grid { display: grid; }
      table { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="../images/logo.webp" alt="Logo">
      <span>Admin KWP3T</span>
    </div>
    <div class="nav-links">
      <a href="admin.html">Dashboard</a>
      <a href="warga.html">Data Warga</a>
      <a href="iuran.html">Bayar Iuran</a>
      <a href="laporan.html" class="active">Laporan Kas</a>
      <a href="riwayat.html">Riwayat Rumah</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Laporan Kas</h1>

    <div class="summary-grid">
      <div class="summary-card"><h3>Saldo Awal</h3><div class="amount" id="saldoAwal">-</div></div>
      <div class="summary-card"><h3>Total Pemasukan</h3><div class="amount" id="totalPemasukan">-</div></div>
      <div class="summary-card"><h3>Total Pengeluaran</h3><div class="amount" id="totalPengeluaran">-</div></div>
      <div class="summary-card"><h3>Saldo Akhir</h3><div class="amount" id="saldoAkhir">-</div></div>
    </div>

    <div class="filter-bar">
      <div class="filter-group"><label>Tanggal Mulai</label><input type="date" id="startDate"></div>
      <div class="filter-group"><label>Tanggal Akhir</label><input type="date" id="endDate"></div>
      <button id="todayBtn" class="btn-quick">Hari Ini</button>
      <button id="monthBtn" class="btn-quick">Bulan Ini</button>
      <button id="filterBtn">Filter</button>
      <button id="resetBtn">Reset</button>
      <button id="printBtn" class="btn-print"><i class="fas fa-print"></i> Cetak</button>
      <button id="exportBtn" class="btn-export"><i class="fas fa-download"></i> Ekspor CSV</button>
    </div>

    <div class="chart-container">
      <canvas id="kasChart"></canvas>
    </div>

    <div style="overflow-x: auto;">
      <table id="kasTable">
        <thead>
          <tr><th>Tanggal</th><th>Keterangan</th><th>Pemasukan</th><th>Pengeluaran</th><th>Saldo</th><th>Sumber</th>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://wuargtxulaquxpziuzho.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1YXJndHh1bGFxdXhweml1emhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjMxNTYsImV4cCI6MjA5MDA5OTE1Nn0.EcVFAGh3ZgTDs8Paz9O_8MpkliKPF0vI7cAuuIsvb2U';
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let chart = null;

      // Cek login dan role
      (async () => {
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) {
          window.location.href = 'login.html';
          return;
        }
        const { data: profile, error } = await supabase
          .from('profiles')
          .select('role')
          .eq('id', user.id)
          .single();
        if (error || !profile) {
          alert('Profil tidak ditemukan. Hubungi administrator.');
          window.location.href = '../index.html';
          return;
        }
        const allowedRoles = ['admin', 'bendahara', 'sekretaris'];
        if (!allowedRoles.includes(profile.role)) {
          alert('Akses ditolak. Hanya pengurus yang dapat mengakses halaman ini.');
          window.location.href = '../index.html';
          return;
        }
        await loadKas();
        setupEventListeners();
      })();

      function formatRupiah(angka) {
        if (angka === null || isNaN(angka)) angka = 0;
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
      }

      // Format tanggal aman dari timezone (gunakan komponen langsung)
      function formatDate(iso) {
        if (!iso) return '';
        const [year, month, day] = iso.split('-');
        return `${day}/${month}/${year}`;
      }

      async function loadKas(start = null, end = null) {
        // Validasi filter tanggal
        if (start && end && start > end) {
          alert('Tanggal mulai tidak boleh lebih besar dari tanggal akhir');
          return;
        }

        // Tampilkan loading
        const tbody = document.querySelector('#kasTable tbody');
        tbody.innerHTML = '<tr><td colspan="6" class="loading">Memuat data...</td></tr>';
        
        // Query data dalam rentang (hanya kolom yang diperlukan)
        let query = supabase
          .from('transaksi_kas')
          .select('tanggal,keterangan,pemasukan,pengeluaran,saldo,sumber')
          .order('tanggal', { ascending: true });
        if (start) query = query.gte('tanggal', start);
        if (end) query = query.lte('tanggal', end);
        const { data, error } = await query;
        if (error) {
          console.error(error);
          tbody.innerHTML = '<tr><td colspan="6">Gagal memuat data</td></tr>';
          return;
        }

        // Hitung saldo awal (sebelum start)
        let saldoAwal = 0;
        if (start) {
          const { data: prevData } = await supabase
            .from('transaksi_kas')
            .select('saldo')
            .lt('tanggal', start)
            .order('tanggal', { ascending: false })
            .limit(1);
          saldoAwal = prevData?.[0]?.saldo || 0;
        } else {
          // Tanpa filter, saldo awal = 0 (konsep akuntansi dasar)
          saldoAwal = 0;
        }

        // Hitung total pemasukan dan pengeluaran dalam rentang
        const totalPemasukan = data.reduce((sum, row) => sum + (row.pemasukan || 0), 0);
        const totalPengeluaran = data.reduce((sum, row) => sum + (row.pengeluaran || 0), 0);
        const saldoAkhir = saldoAwal + totalPemasukan - totalPengeluaran;

        // Update summary
        document.getElementById('saldoAwal').innerText = formatRupiah(saldoAwal);
        document.getElementById('totalPemasukan').innerText = formatRupiah(totalPemasukan);
        document.getElementById('totalPengeluaran').innerText = formatRupiah(totalPengeluaran);
        document.getElementById('saldoAkhir').innerText = formatRupiah(saldoAkhir);

        // Render tabel
        renderTable(data);

        // Update grafik
        updateChart(data);
      }

      function renderTable(data) {
        const tbody = document.querySelector('#kasTable tbody');
        tbody.innerHTML = '';
        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6">Tidak ada transaksi dalam rentang ini</td></tr>';
          return;
        }
        data.forEach(row => {
          const tr = tbody.insertRow();
          tr.insertCell(0).innerText = formatDate(row.tanggal);
          tr.insertCell(1).innerText = row.keterangan;
          // Warna hijau untuk pemasukan, merah untuk pengeluaran
          tr.insertCell(2).innerHTML = row.pemasukan ? `<span style="color:green;font-weight:bold">${formatRupiah(row.pemasukan)}</span>` : '-';
          tr.insertCell(3).innerHTML = row.pengeluaran ? `<span style="color:red;font-weight:bold">${formatRupiah(row.pengeluaran)}</span>` : '-';
          tr.insertCell(4).innerText = formatRupiah(row.saldo);
          tr.insertCell(5).innerText = row.sumber || '-';
        });
      }

      async function exportCSV() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        let query = supabase.from('transaksi_kas').select('tanggal,keterangan,pemasukan,pengeluaran,saldo,sumber').order('tanggal', { ascending: true });
        if (start) query = query.gte('tanggal', start);
        if (end) query = query.lte('tanggal', end);
        const { data, error } = await query;
        if (error) {
          alert('Gagal mengambil data untuk ekspor');
          return;
        }
        // Header CSV sesuai dengan kolom yang dipilih
        const headers = ['tanggal','keterangan','pemasukan','pengeluaran','saldo','sumber'];
        const rows = data.map(row => headers.map(h => {
          let val = row[h];
          if (h === 'tanggal') val = formatDate(row.tanggal);
          if (typeof val === 'number') val = val.toString();
          if (typeof val === 'string' && (val.includes(',') || val.includes('"'))) val = `"${val.replace(/"/g, '""')}"`;
          return val || '';
        }).join(','));
        const csv = [headers.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = `laporan_kas_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(url);
      }

      function updateChart(data) {
        const ctx = document.getElementById('kasChart').getContext('2d');
        if (chart) chart.destroy();

        // Kelompokkan per bulan
        const monthly = {};
        data.forEach(row => {
          const date = new Date(row.tanggal);
          const key = `${date.getFullYear()}-${date.getMonth()+1}`;
          if (!monthly[key]) monthly[key] = { pemasukan: 0, pengeluaran: 0 };
          monthly[key].pemasukan += row.pemasukan || 0;
          monthly[key].pengeluaran += row.pengeluaran || 0;
        });

        // Urutkan bulan dengan cara yang stabil (menggunakan angka, bukan string)
        const sortedKeys = Object.keys(monthly).sort((a, b) => {
          const [y1, m1] = a.split('-').map(Number);
          const [y2, m2] = b.split('-').map(Number);
          if (y1 !== y2) return y1 - y2;
          return m1 - m2;
        });
        
        // Buat labels dengan format "Mar 2025"
        const labels = sortedKeys.map(key => {
          const [y, m] = key.split('-');
          const date = new Date(parseInt(y), parseInt(m)-1);
          return date.toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });
        });

        // Mapping data sesuai urutan labels
        const pemasukanData = sortedKeys.map(key => monthly[key].pemasukan);
        const pengeluaranData = sortedKeys.map(key => monthly[key].pengeluaran);

        chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [
              { label: 'Pemasukan', data: pemasukanData, backgroundColor: 'rgba(46, 204, 113, 0.7)', borderColor: '#2ecc71', borderWidth: 1 },
              { label: 'Pengeluaran', data: pengeluaranData, backgroundColor: 'rgba(231, 76, 60, 0.7)', borderColor: '#e74c3c', borderWidth: 1 }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            scales: {
              y: { ticks: { callback: (val) => formatRupiah(val) } }
            }
          }
        });
      }

      function printReport() {
        window.print();
      }

      function setupEventListeners() {
        const startInput = document.getElementById('startDate');
        const endInput = document.getElementById('endDate');
        const todayBtn = document.getElementById('todayBtn');
        const monthBtn = document.getElementById('monthBtn');
        const filterBtn = document.getElementById('filterBtn');
        const resetBtn = document.getElementById('resetBtn');
        const exportBtn = document.getElementById('exportBtn');
        const printBtn = document.getElementById('printBtn');

        // Auto reload saat ubah tanggal (jika kedua tanggal sudah terisi)
        startInput.addEventListener('change', () => {
          if (endInput.value) loadKas(startInput.value, endInput.value);
        });
        endInput.addEventListener('change', () => {
          if (startInput.value) loadKas(startInput.value, endInput.value);
        });

        todayBtn.addEventListener('click', () => {
          const today = new Date().toISOString().split('T')[0];
          startInput.value = today;
          endInput.value = today;
          loadKas(today, today);
        });
        monthBtn.addEventListener('click', () => {
          const now = new Date();
          const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
          const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
          startInput.value = firstDay;
          endInput.value = lastDay;
          loadKas(firstDay, lastDay);
        });
        filterBtn.addEventListener('click', () => {
          const start = startInput.value;
          const end = endInput.value;
          loadKas(start, end);
        });
        resetBtn.addEventListener('click', () => {
          startInput.value = '';
          endInput.value = '';
          loadKas();
        });
        exportBtn.addEventListener('click', exportCSV);
        printBtn.addEventListener('click', printReport);

        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
          e.preventDefault();
          await supabase.auth.signOut();
          window.location.href = 'login.html';
        });
      }

      // (Optional) Saran untuk performa: buat index di database
      // CREATE INDEX idx_tanggal ON transaksi_kas(tanggal);
    })();
  </script>
</body>
</html>
