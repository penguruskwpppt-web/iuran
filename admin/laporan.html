<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Laporan Kas - KWP3T Admin</title>
  <link rel="icon" href="../images/logo.webp" type="image/webp">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f4f4;
    }
    .navbar {
      background: #0b2e4f;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
    }
    .nav-brand img { width: 40px; border-radius: 50%; }
    .nav-links {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .nav-links a {
      color: white;
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: #1e4f7a;
    }
    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 20px;
    }
    h1 {
      margin-bottom: 20px;
      color: #0b2e4f;
    }
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 24px;
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .filter-group label {
      font-weight: 600;
      font-size: 0.85rem;
    }
    input, button {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: inherit;
    }
    button {
      background: #0b2e4f;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: #1e4f7a;
    }
    .btn-print {
      background: #2c3e50;
      margin-left: auto;
    }
    .btn-export {
      background: #27ae60;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      font-size: 0.85rem;
    }
    th, td {
      border: 1px solid #e2e8f0;
      padding: 12px;
      text-align: left;
    }
    th {
      background: #0b2e4f;
      color: white;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }
    .summary-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border-left: 5px solid #f59e0b;
    }
    .summary-card h3 {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 8px;
    }
    .summary-card .amount {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0b2e4f;
    }
    @media (max-width: 768px) {
      .navbar { flex-direction: column; align-items: stretch; }
      .nav-links { justify-content: center; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-bar { flex-direction: column; align-items: stretch; }
      .btn-print { margin-left: 0; }
      table { font-size: 0.75rem; }
      th, td { padding: 8px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="../images/logo.webp" alt="Logo">
      <span>Admin KWP3T</span>
    </div>
    <div class="nav-links">
      <a href="admin.html">Dashboard</a>
      <a href="warga.html">Data Warga</a>
      <a href="iuran.html">Bayar Iuran</a>
      <a href="laporan.html" class="active">Laporan Kas</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Laporan Kas</h1>

    <div class="summary-grid">
      <div class="summary-card"><h3>Saldo Awal</h3><div class="amount" id="saldoAwal">-</div></div>
      <div class="summary-card"><h3>Total Pemasukan</h3><div class="amount" id="totalPemasukan">-</div></div>
      <div class="summary-card"><h3>Total Pengeluaran</h3><div class="amount" id="totalPengeluaran">-</div></div>
      <div class="summary-card"><h3>Saldo Akhir</h3><div class="amount" id="saldoAkhir">-</div></div>
    </div>

    <div class="filter-bar">
      <div class="filter-group"><label>Tanggal Mulai</label><input type="date" id="startDate"></div>
      <div class="filter-group"><label>Tanggal Akhir</label><input type="date" id="endDate"></div>
      <button id="filterBtn">Filter</button>
      <button id="resetBtn">Reset</button>
      <button id="printBtn" class="btn-print"><i class="fas fa-print"></i> Cetak</button>
      <button id="exportBtn" class="btn-export"><i class="fas fa-download"></i> Ekspor CSV</button>
    </div>

    <div style="overflow-x: auto;">
      <table id="kasTable">
        <thead>
          <tr><th>Tanggal</th><th>Keterangan</th><th>Pemasukan</th><th>Pengeluaran</th><th>Saldo</th><th>Sumber</th>
        </thead>
        <tbody></tbody>
       </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wuargtxulaquxpziuzho.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1YXJndHh1bGFxdXhweml1emhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjMxNTYsImV4cCI6MjA5MDA5OTE1Nn0.EcVFAGh3ZgTDs8Paz9O_8MpkliKPF0vI7cAuuIsvb2U';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let saldoAwalGlobal = 0;

    // Cek login
    (async () => {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) window.location.href = 'login.html';
    })();

    function formatRupiah(angka) {
      if (angka === null || isNaN(angka)) angka = 0;
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function fetchSaldoAwal() {
      const { data, error } = await supabase
        .from('transaksi_kas')
        .select('saldo')
        .eq('sumber', 'Saldo Awal')
        .limit(1);
      if (error) console.error(error);
      if (data && data.length > 0) saldoAwalGlobal = data[0].saldo;
      else saldoAwalGlobal = 0;
    }

    async function loadKas(start = null, end = null) {
      let query = supabase.from('transaksi_kas').select('*').order('tanggal', { ascending: true });
      if (start) query = query.gte('tanggal', start);
      if (end) query = query.lte('tanggal', end);
      const { data, error } = await query;
      if (error) console.error(error);
      else {
        const filteredData = data || [];
        updateSummary(filteredData);
        renderTable(filteredData);
      }
    }

    function updateSummary(data) {
      const totalPemasukan = data.reduce((sum, row) => sum + (row.pemasukan || 0), 0);
      const totalPengeluaran = data.reduce((sum, row) => sum + (row.pengeluaran || 0), 0);
      const saldoAkhir = data.length > 0 ? data[data.length - 1].saldo : 0;
      document.getElementById('saldoAwal').innerText = formatRupiah(saldoAwalGlobal);
      document.getElementById('totalPemasukan').innerText = formatRupiah(totalPemasukan);
      document.getElementById('totalPengeluaran').innerText = formatRupiah(totalPengeluaran);
      document.getElementById('saldoAkhir').innerText = formatRupiah(saldoAkhir);
    }

    function renderTable(data) {
      const tbody = document.querySelector('#kasTable tbody');
      tbody.innerHTML = '';
      data.forEach(row => {
        const tr = tbody.insertRow();
        tr.insertCell(0).innerText = formatDate(row.tanggal);
        tr.insertCell(1).innerText = row.keterangan;
        tr.insertCell(2).innerText = row.pemasukan ? formatRupiah(row.pemasukan) : '-';
        tr.insertCell(3).innerText = row.pengeluaran ? formatRupiah(row.pengeluaran) : '-';
        tr.insertCell(4).innerText = formatRupiah(row.saldo);
        tr.insertCell(5).innerText = row.sumber || '-';
      });
    }

    async function exportCSV() {
      const { data, error } = await supabase.from('transaksi_kas').select('*').order('tanggal', { ascending: true });
      if (error) return alert('Gagal mengambil data');
      const headers = ['tanggal','keterangan','pemasukan','pengeluaran','saldo','jenis','sumber'];
      const rows = data.map(row => headers.map(h => {
        let val = row[h];
        if (h === 'tanggal') val = formatDate(row.tanggal);
        if (typeof val === 'number') val = val.toString();
        if (typeof val === 'string' && (val.includes(',') || val.includes('"'))) val = `"${val.replace(/"/g, '""')}"`;
        return val || '';
      }).join(','));
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = `laporan_kas_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function printReport() {
      window.print();
    }

    // Inisialisasi
    await fetchSaldoAwal();
    loadKas();

    document.getElementById('filterBtn').addEventListener('click', () => {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      loadKas(start, end);
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('startDate').value = '';
      document.getElementById('endDate').value = '';
      loadKas();
    });
    document.getElementById('exportBtn').addEventListener('click', exportCSV);
    document.getElementById('printBtn').addEventListener('click', printReport);

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
