<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Kas - Iuran Warga</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/logo_192.png">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="images/logo_192.png" alt="Logo" width="40">
      <span>Iuran Warga</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="warga.html">Data Warga</a>
      <a href="iuran.html">Bayar Iuran</a>
      <a href="laporan.html" class="active">Laporan Kas</a>
      <a href="admin.html">Admin Panel</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Laporan Kas</h1>
    <div class="filter-bar">
      <label>Tanggal Mulai:</label>
      <input type="date" id="startDate">
      <label>Tanggal Akhir:</label>
      <input type="date" id="endDate">
      <button id="filterBtn" class="btn-primary">Filter</button>
      <button id="resetFilterBtn" class="btn-secondary">Reset</button>
    </div>
    <div style="overflow-x: auto;">
      <table id="kasTable">
        <thead>
          <tr>
            <th>Tanggal</th><th>Keterangan</th><th>Pemasukan</th><th>Pengeluaran</th><th>Saldo</th><th>Sumber</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { supabase, requireAuth } from './js/app.js'
    import { formatDate, formatRupiah } from './js/utils.js'

    await requireAuth()

    async function loadKas(startDate = null, endDate = null) {
      let query = supabase
        .from('transaksi_kas')
        .select('*')
        .order('tanggal', { ascending: false })

      if (startDate) query = query.gte('tanggal', startDate)
      if (endDate) query = query.lte('tanggal', endDate)

      const { data, error } = await query
      if (error) console.error(error)
      else renderKasTable(data)
    }

    function renderKasTable(transactions) {
      const tbody = document.querySelector('#kasTable tbody')
      tbody.innerHTML = ''
      transactions.forEach(t => {
        const row = tbody.insertRow()
        row.insertCell(0).innerText = formatDate(t.tanggal)
        row.insertCell(1).innerText = t.keterangan
        row.insertCell(2).innerText = t.pemasukan ? formatRupiah(t.pemasukan) : '-'
        row.insertCell(3).innerText = t.pengeluaran ? formatRupiah(t.pengeluaran) : '-'
        row.insertCell(4).innerText = formatRupiah(t.saldo)
        row.insertCell(5).innerText = t.sumber || '-'
      })
    }

    document.getElementById('filterBtn').addEventListener('click', () => {
      const start = document.getElementById('startDate').value
      const end = document.getElementById('endDate').value
      loadKas(start, end)
    })

    document.getElementById('resetFilterBtn').addEventListener('click', () => {
      document.getElementById('startDate').value = ''
      document.getElementById('endDate').value = ''
      loadKas()
    })

    loadKas()

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    })
  </script>
</body>
</html>
