<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - KWP3T</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #0b2e4f 0%, #1e4f7a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #0b2e4f;
      font-size: 1.8rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1e293b;
    }
    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-right: 40px;
    }
    #togglePassword {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.1rem;
      color: #64748b;
      transition: 0.2s;
    }
    #togglePassword:hover {
      color: #f59e0b;
    }
    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 1rem;
      transition: 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
    }
    .btn-login {
      background: #f59e0b;
      color: #000;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover {
      background: #e67e22;
      transform: translateY(-2px);
    }
    .btn-login.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .info-message {
      background: #e2e3e5;
      color: #1e293b;
      padding: 12px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    .back-link a {
      color: #0b2e4f;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>🔐 Login Admin KWP3T</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Email" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <span id="togglePassword">👁️</span>
      </div>
    </div>
    <button id="loginBtn" class="btn-login">Login</button>
    <div id="infoMessage" class="info-message"></div>
    <div id="errorMessage" class="error-message"></div>
    <div class="back-link">
      <a href="../index.html">← Kembali ke halaman utama</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = 'https://wuargtxulaquxpziuzho.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1YXJndHh1bGFxdXhweml1emhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MjMxNTYsImV4cCI6MjA5MDA5OTE1Nn0.EcVFAGh3ZgTDs8Paz9O_8MpkliKPF0vI7cAuuIsvb2U';
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const loginBtn = document.getElementById('loginBtn');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const togglePassword = document.getElementById('togglePassword');
      const infoDiv = document.getElementById('infoMessage');
      const errorDiv = document.getElementById('errorMessage');

      let isLoading = false;

      function showInfo(msg) {
        infoDiv.style.display = 'block';
        infoDiv.innerText = msg;
        errorDiv.style.display = 'none';
      }
      function showError(msg) {
        errorDiv.style.display = 'block';
        errorDiv.innerText = msg;
        infoDiv.style.display = 'none';
      }
      function hideMessages() {
        infoDiv.style.display = 'none';
        errorDiv.style.display = 'none';
      }

      function translateError(msg) {
        if (msg.includes('Invalid login credentials')) {
          return 'Email atau password salah';
        }
        if (msg.includes('Email not confirmed')) {
          return 'Email belum dikonfirmasi. Periksa inbox untuk verifikasi.';
        }
        if (msg.includes('User not found')) {
          return 'Email tidak terdaftar.';
        }
        return 'Login gagal, silakan coba lagi.';
      }

      // Auto focus
      emailInput.focus();

      // Toggle password
      togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
      });

      // Cek apakah sudah login (dengan pesan halus)
      (async () => {
        try {
          const { data: { user } } = await supabaseClient.auth.getUser();
          if (user) {
            showInfo('🔄 Sesi ditemukan, mengalihkan...');
            setTimeout(() => {
              window.location.href = 'admin.html';
            }, 500);
          }
        } catch (err) {
          console.error('Error checking session:', err);
        }
      })();

      // Fungsi login dengan anti-spam, validasi, spinner
      const performLogin = async () => {
        if (isLoading) return;
        hideMessages();

        let email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value.trim();

        // Validasi email
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
          showError('Format email tidak valid');
          return;
        }

        if (!password) {
          showError('Password harus diisi');
          return;
        }

        isLoading = true;
        loginBtn.classList.add('loading');
        loginBtn.innerHTML = '<span class="spinner"></span> Memproses...';

        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) {
            showError(translateError(error.message));
            console.error('Login error:', error);
          } else {
            showInfo('✅ Login berhasil, mengalihkan...');
            setTimeout(() => {
              window.location.href = 'admin.html';
            }, 600);
          }
        } catch (err) {
          showError('Terjadi kesalahan jaringan. Periksa koneksi internet Anda.');
          console.error('Network error:', err);
        } finally {
          isLoading = false;
          loginBtn.classList.remove('loading');
          loginBtn.innerHTML = 'Login';
        }
      };

      // ========== UX IMPROVEMENTS ==========
      // 1. Enter hanya pada input email & password (bukan global)
      [emailInput, passwordInput].forEach(input => {
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            performLogin();
          }
        });
      });

      // 2. Enter di email langsung pindah ke password (auto-focus)
      emailInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          passwordInput.focus();
        }
      });

      // Event klik tombol login
      loginBtn.addEventListener('click', performLogin);
    })();
  </script>
</body>
</html>
