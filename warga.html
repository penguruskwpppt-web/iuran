<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Warga - Iuran Warga</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/logo_192.png">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="images/logo_192.png" alt="Logo" width="40">
      <span>Iuran Warga</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="warga.html" class="active">Data Warga</a>
      <a href="iuran.html">Bayar Iuran</a>
      <a href="laporan.html">Laporan Kas</a>
      <a href="admin.html">Admin Panel</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Data Warga</h1>
    <button id="btnTambahWarga" class="btn-primary">Tambah Warga</button>
    <div style="overflow-x: auto;">
      <table id="wargaTable">
        <thead>
          <tr>
            <th>No Rumah</th><th>Nama Pemilik</th><th>No HP</th><th>Status</th><th>Kondisi</th><th>Iuran/Bulan</th><th>Koordinator</th><th>Aksi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Modal Form Warga -->
  <div id="modalWarga" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Tambah Warga</h2>
      <form id="wargaForm">
        <input type="hidden" id="no_rumah_old">
        <input type="text" id="no_rumah" placeholder="No Rumah" required>
        <input type="text" id="nama_pemilik" placeholder="Nama Pemilik" required>
        <input type="text" id="no_hp_pemilik" placeholder="No HP">
        <select id="status_kepemilikan">
          <option value="Milik Sendiri">Milik Sendiri</option>
          <option value="Kontrak">Kontrak</option>
        </select>
        <select id="kondisi_terakhir">
          <option value="Berpenghuni">Berpenghuni</option>
          <option value="Kosong">Kosong</option>
          <option value="Dibebaskan">Dibebaskan</option>
        </select>
        <input type="number" id="iuran_per_bulan" placeholder="Iuran per bulan" value="75000">
        <input type="text" id="koordinator" placeholder="Koordinator">
        <div class="modal-buttons">
          <button type="submit">Simpan</button>
          <button type="button" id="closeModal">Batal</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { supabase, requireAuth } from './js/app.js'
    import { formatRupiah } from './js/utils.js'

    await requireAuth()

    let currentEdit = null

    async function loadWarga() {
      const { data, error } = await supabase
        .from('warga')
        .select('*')
        .order('no_rumah')
      if (error) console.error(error)
      else renderTable(data)
    }

    function renderTable(wargaList) {
      const tbody = document.querySelector('#wargaTable tbody')
      tbody.innerHTML = ''
      wargaList.forEach(w => {
        const row = tbody.insertRow()
        row.insertCell(0).innerText = w.no_rumah
        row.insertCell(1).innerText = w.nama_pemilik
        row.insertCell(2).innerText = w.no_hp_pemilik || '-'
        row.insertCell(3).innerText = w.status_kepemilikan
        row.insertCell(4).innerText = w.kondisi_terakhir
        row.insertCell(5).innerText = formatRupiah(w.iuran_per_bulan)
        row.insertCell(6).innerText = w.koordinator || '-'
        const actionCell = row.insertCell(7)
        const editBtn = document.createElement('button')
        editBtn.innerText = 'Edit'
        editBtn.className = 'btn-edit'
        editBtn.onclick = () => openModal(w)
        const deleteBtn = document.createElement('button')
        deleteBtn.innerText = 'Hapus'
        deleteBtn.className = 'btn-delete'
        deleteBtn.onclick = () => deleteWarga(w.no_rumah)
        actionCell.appendChild(editBtn)
        actionCell.appendChild(deleteBtn)
      })
    }

    function openModal(warga = null) {
      const modal = document.getElementById('modalWarga')
      document.getElementById('modalTitle').innerText = warga ? 'Edit Warga' : 'Tambah Warga'
      if (warga) {
        document.getElementById('no_rumah_old').value = warga.no_rumah
        document.getElementById('no_rumah').value = warga.no_rumah
        document.getElementById('no_rumah').disabled = true
        document.getElementById('nama_pemilik').value = warga.nama_pemilik
        document.getElementById('no_hp_pemilik').value = warga.no_hp_pemilik || ''
        document.getElementById('status_kepemilikan').value = warga.status_kepemilikan
        document.getElementById('kondisi_terakhir').value = warga.kondisi_terakhir
        document.getElementById('iuran_per_bulan').value = warga.iuran_per_bulan
        document.getElementById('koordinator').value = warga.koordinator || ''
        currentEdit = warga.no_rumah
      } else {
        document.getElementById('no_rumah_old').value = ''
        document.getElementById('no_rumah').disabled = false
        document.getElementById('no_rumah').value = ''
        document.getElementById('nama_pemilik').value = ''
        document.getElementById('no_hp_pemilik').value = ''
        document.getElementById('status_kepemilikan').value = 'Milik Sendiri'
        document.getElementById('kondisi_terakhir').value = 'Berpenghuni'
        document.getElementById('iuran_per_bulan').value = '75000'
        document.getElementById('koordinator').value = ''
        currentEdit = null
      }
      modal.style.display = 'block'
    }

    document.getElementById('closeModal').onclick = () => {
      document.getElementById('modalWarga').style.display = 'none'
    }

    document.getElementById('wargaForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const data = {
        no_rumah: document.getElementById('no_rumah').value,
        nama_pemilik: document.getElementById('nama_pemilik').value,
        no_hp_pemilik: document.getElementById('no_hp_pemilik').value || null,
        status_kepemilikan: document.getElementById('status_kepemilikan').value,
        kondisi_terakhir: document.getElementById('kondisi_terakhir').value,
        iuran_per_bulan: parseInt(document.getElementById('iuran_per_bulan').value),
        koordinator: document.getElementById('koordinator').value || null,
        updated_at: new Date()
      }
      let error
      if (currentEdit) {
        // Update
        const { error: updateError } = await supabase
          .from('warga')
          .update(data)
          .eq('no_rumah', currentEdit)
        error = updateError
      } else {
        // Insert
        data.created_at = new Date()
        const { error: insertError } = await supabase
          .from('warga')
          .insert([data])
        error = insertError
      }
      if (error) {
        alert('Gagal menyimpan: ' + error.message)
      } else {
        document.getElementById('modalWarga').style.display = 'none'
        loadWarga()
      }
    })

    async function deleteWarga(no_rumah) {
      if (confirm(`Yakin hapus rumah ${no_rumah}?`)) {
        const { error } = await supabase
          .from('warga')
          .delete()
          .eq('no_rumah', no_rumah)
        if (error) alert('Gagal hapus: ' + error.message)
        else loadWarga()
      }
    }

    document.getElementById('btnTambahWarga').onclick = () => openModal()
    loadWarga()

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    })
  </script>
</body>
</html>
