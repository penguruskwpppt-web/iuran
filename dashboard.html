<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Iuran Warga</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/logo_192.png">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="images/logo_192.png" alt="Logo" width="40">
      <span>Iuran Warga</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="warga.html">Data Warga</a>
      <a href="iuran.html">Bayar Iuran</a>
      <a href="laporan.html">Laporan Kas</a>
      <a href="admin.html">Admin Panel</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Dashboard</h1>
    <div class="stats">
      <div class="card">
        <h3>Total Rumah Berpenghuni</h3>
        <p id="totalBerpenghuni">-</p>
      </div>
      <div class="card">
        <h3>Total Iuran Bulan Ini</h3>
        <p id="totalIuranBulanIni">-</p>
      </div>
      <div class="card">
        <h3>Saldo Kas Terakhir</h3>
        <p id="saldoTerakhir">-</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase, requireAuth } from './js/app.js'
    import { formatRupiah } from './js/utils.js'

    await requireAuth()

    async function loadDashboard() {
      // Total berpenghuni
      const { count: totalPenghuni } = await supabase
        .from('warga')
        .select('*', { count: 'exact', head: true })
        .eq('kondisi_terakhir', 'Berpenghuni')
      document.getElementById('totalBerpenghuni').innerText = totalPenghuni || 0

      // Total iuran bulan ini (dari transaksi_kas)
      const now = new Date()
      const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString()
      const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString()
      const { data: iuranList } = await supabase
        .from('transaksi_kas')
        .select('pemasukan')
        .eq('jenis', 'Pemasukan')
        .eq('sumber', 'Iuran Warga')
        .gte('tanggal', firstDay)
        .lte('tanggal', lastDay)
      let totalIuran = iuranList?.reduce((s, t) => s + t.pemasukan, 0) || 0
      document.getElementById('totalIuranBulanIni').innerText = formatRupiah(totalIuran)

      // Saldo terakhir
      const { data: lastSaldo } = await supabase
        .from('transaksi_kas')
        .select('saldo')
        .order('tanggal', { ascending: false })
        .limit(1)
      const saldo = lastSaldo?.[0]?.saldo || 0
      document.getElementById('saldoTerakhir').innerText = formatRupiah(saldo)
    }

    loadDashboard()

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    })
  </script>
</body>
</html>
