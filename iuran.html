<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayar Iuran - Iuran Warga</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/logo_192.png">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <img src="images/logo_192.png" alt="Logo" width="40">
      <span>Iuran Warga</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="warga.html">Data Warga</a>
      <a href="iuran.html" class="active">Bayar Iuran</a>
      <a href="laporan.html">Laporan Kas</a>
      <a href="admin.html">Admin Panel</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <h1>Pembayaran Iuran Bulanan</h1>
    <form id="iuranForm">
      <label>Pilih Rumah:</label>
      <select id="no_rumah" required></select>

      <label>Bulan (YYYY-MM):</label>
      <input type="month" id="bulan" required>

      <label>Jumlah Iuran (Rp):</label>
      <input type="number" id="jumlah" required>

      <label>Metode Pembayaran:</label>
      <select id="metode">
        <option value="Tunai">Tunai</option>
        <option value="Transfer">Transfer</option>
      </select>

      <label>Bukti Transfer (opsional):</label>
      <input type="file" id="buktiFile" accept="image/*">

      <button type="submit">Simpan Pembayaran</button>
    </form>
    <div id="result"></div>
  </div>

  <script type="module">
    import { supabase, requireAuth } from './js/app.js'
    import { formatRupiah } from './js/utils.js'

    await requireAuth()

    async function loadWarga() {
      const { data, error } = await supabase
        .from('warga')
        .select('no_rumah, nama_pemilik, iuran_per_bulan')
        .eq('kondisi_terakhir', 'Berpenghuni')
        .gt('iuran_per_bulan', 0)
      if (error) console.error(error)
      else {
        const select = document.getElementById('no_rumah')
        select.innerHTML = '<option value="">-- Pilih Rumah --</option>'
        data.forEach(w => {
          const option = document.createElement('option')
          option.value = w.no_rumah
          option.textContent = `${w.no_rumah} - ${w.nama_pemilik} (${formatRupiah(w.iuran_per_bulan)})`
          option.setAttribute('data-iuran', w.iuran_per_bulan)
          select.appendChild(option)
        })
      }
    }

    document.getElementById('no_rumah').addEventListener('change', (e) => {
      const selected = e.target.selectedOptions[0]
      const iuran = selected.getAttribute('data-iuran')
      if (iuran) document.getElementById('jumlah').value = iuran
    })

    document.getElementById('iuranForm').addEventListener('submit', async (e) => {
      e.preventDefault()
      const no_rumah = document.getElementById('no_rumah').value
      const bulanStr = document.getElementById('bulan').value
      const bulan = new Date(bulanStr + '-01')
      const jumlah = parseInt(document.getElementById('jumlah').value)
      const metode = document.getElementById('metode').value
      const fileInput = document.getElementById('buktiFile')
      const file = fileInput.files[0]

      if (!no_rumah || !bulanStr || !jumlah) {
        alert('Harap lengkapi data')
        return
      }

      let buktiUrl = null
      if (file) {
        const fileExt = file.name.split('.').pop()
        const fileName = `${no_rumah}_${bulanStr}_${Date.now()}.${fileExt}`
        const { data: uploadData, error: uploadError } = await supabase.storage
          .from('bukti-iuran')
          .upload(fileName, file)
        if (uploadError) {
          alert('Gagal upload bukti: ' + uploadError.message)
          return
        }
        const { data: urlData } = supabase.storage.from('bukti-iuran').getPublicUrl(fileName)
        buktiUrl = urlData.publicUrl
      }

      // Insert ke transaksi_iuran
      const kasId = `IU-${new Date().toISOString().slice(0,10).replace(/-/g,'')}-${Date.now().toString().slice(-6)}`
      const { data: iuranData, error: iuranError } = await supabase
        .from('transaksi_iuran')
        .insert([{
          kas_id: kasId,
          no_rumah,
          bulan: bulan.toISOString(),
          jumlah,
          metode,
          bukti_tf: buktiUrl
        }])
        .select()
      if (iuranError) {
        alert('Gagal simpan iuran: ' + iuranError.message)
        return
      }

      // Ambil saldo terakhir
      const { data: lastSaldo } = await supabase
        .from('transaksi_kas')
        .select('saldo')
        .order('tanggal', { ascending: false })
        .limit(1)
      let saldo = lastSaldo?.[0]?.saldo || 0
      const newSaldo = saldo + jumlah

      // Insert ke transaksi_kas
      const { error: kasError } = await supabase
        .from('transaksi_kas')
        .insert([{
          kas_id: kasId,
          tanggal: new Date(),
          keterangan: `Iuran ${no_rumah} bulan ${bulanStr}`,
          pemasukan: jumlah,
          saldo: newSaldo,
          jenis: 'Pemasukan',
          sumber: 'Iuran Warga'
        }])
      if (kasError) {
        alert('Gagal update kas: ' + kasError.message)
        return
      }

      alert('Pembayaran iuran berhasil disimpan!')
      document.getElementById('iuranForm').reset()
      loadWarga()
    })

    loadWarga()

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault()
      await supabase.auth.signOut()
      window.location.href = 'login.html'
    })
  </script>
</body>
</html>
